<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTMX Items Demo</title>

    <!-- Load HTMX from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>
  </head>
  <body>
    <h1>HTMX Items Demo</h1>

    <!-- Button that loads the current list -->
    <button
      hx-get="/items-partial"
      hx-target="#items-container"
      hx-swap="innerHTML"
    >
      Load Items
    </button>

    <!-- New item form -->
    <h2>Add Item</h2>
    <form
      hx-post="/api/items"
      hx-target="#items-container"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset()"
    >
      <input type="text" name="name" placeholder="Item name" required />
      <button type="submit">Add</button>
    </form>

    <!-- Where the items will appear -->
    <div id="items-container">
      <!-- HTMX will inject HTML here -->
    </div>
  </body>
</html>
