name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Run your tests (this also gives you syntax/type errors)
      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Test frontend
        working-directory: frontend
        run: npm test
